<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis XV Años - Valentina</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:30px;
}

.silver-title{
font-family:'Playfair Display',serif;
font-size:40px;
background:linear-gradient(90deg,#d9d9d9,#ffffff,#bfbfbf);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

.menu-premium{
display:flex;
flex-direction:column;
gap:15px;
margin-top:25px;
width:80%;
max-width:320px;
}

.btn-premium{
padding:16px;
border-radius:40px;
border:1px solid rgba(255,255,255,0.3);
background:linear-gradient(145deg,rgba(255,255,255,0.15),rgba(255,255,255,0.05));
color:white;
font-size:14px;
letter-spacing:2px;
backdrop-filter:blur(10px);
cursor:pointer;
transition:all 0.4s ease;
box-shadow:0 0 10px rgba(255,255,255,0.1), inset 0 0 10px rgba(255,255,255,0.05);
}

.btn-premium:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,255,255,0.3), inset 0 0 15px rgba(255,255,255,0.1);
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#111;
padding:30px;
border-radius:20px;
width:80%;
max-width:350px;
text-align:center;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
}

input,select{
padding:10px;
margin:10px;
border-radius:8px;
border:none;
width:80%;
}

/* COUNTDOWN */
.countdown{
display:flex;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
justify-content:center;
}

.count-box{
border:1px solid #aaa;
padding:10px;
border-radius:10px;
min-width:70px;
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="musica" loop preload="auto">
  <source src="./musica.mp3.mp3" type="audio/mpeg">
</audio>

<!-- FASE 1 -->
<div class="section" id="intro">
<h1 class="silver-title">MIS XV AÑOS</h1>
<button class="btn-premium" onclick="startInvitation()">Entrar a la fiesta</button>
</div>

<!-- FASE 2 -->
<div class="section" id="main" style="display:none;">

<h2 class="silver-title">Valentina Calderón Vega</h2>

<img src="Foto3.png" style="width:90%;border-radius:20px;">

<!-- CUENTA REGRESIVA -->
<div id="countdown" class="countdown"></div>

<p>
03 de octubre de 2026<br>
5:00 p.m.<br>
Pronatura Park
</p>

<div class="menu-premium">

<button class="btn-premium" onclick="openWaze()">
📍 UBICACIÓN
</button>

<button class="btn-premium" onclick="abrirDressCode()">
👗 CÓDIGO DE VESTIMENTA
</button>

<button class="btn-premium" onclick="abrirConfirmacion()">
💌 CONFIRMAR ASISTENCIA
</button>

<button class="btn-premium" onclick="window.open('https://docs.google.com/forms/d/1H5lpaA8m5TDWmy_-v-TeAnGO709gMx_Rq-nNj_UDOvg/viewform')">
📸 CARGAR RECUERDOS
</button>

</div>

</div>

<!-- MODAL VESTIMENTA -->
<div id="dressModal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarDressCode()">&times;</span>
<h2 class="silver-title">Código de Vestimenta</h2>
<p>
Formal elegante<br><br>
Tonos plateados, grises o claros<br><br>
Evitar blanco
</p>
</div>
</div>

<!-- MODAL CONFIRMACION -->
<div id="confirmModal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarConfirmacion()">&times;</span>
<h2 class="silver-title">Confirmar Asistencia</h2>

<input type="text" id="nombre" placeholder="Tu nombre">

<select id="asistiran"></select>

<button class="btn-premium" onclick="enviarConfirmacion()">
Enviar Confirmación
</button>

</div>
</div>

<script>

// PARAMETROS URL
const params = new URLSearchParams(window.location.search);
const invitado = params.get('invitado') || "";
const espacios = parseInt(params.get('espacios')) || 1;

// CARGA INICIAL
window.onload = function(){

document.getElementById("nombre").value = invitado;

const select = document.getElementById("asistiran");
select.innerHTML = "";

for(let i=1;i<=espacios;i++){
let option=document.createElement("option");
option.value=i;
option.text=i+" persona(s)";
select.appendChild(option);
}

}

// FUNCIONES
function startInvitation(){
document.getElementById("intro").style.display="none";
document.getElementById("main").style.display="flex";

const music=document.getElementById("musica");
music.volume=0.8;
music.play();
}

function openWaze(){
window.open("https://waze.com/ul?q=Pronatura%20Park");
}

function abrirDressCode(){
document.getElementById("dressModal").style.display="flex";
}

function cerrarDressCode(){
document.getElementById("dressModal").style.display="none";
}

function abrirConfirmacion(){
document.getElementById("confirmModal").style.display="flex";
}

function cerrarConfirmacion(){
document.getElementById("confirmModal").style.display="none";
}

function enviarConfirmacion(){

const nombre=document.getElementById("nombre").value;
const cantidad=document.getElementById("asistiran").value;

const mensaje=`Hola, confirmo asistencia a los XV años de Valentina Calderón Vega.
Invitado: ${invitado}
Nombre: ${nombre}
Cantidad de personas: ${cantidad}`;

window.open(`https://wa.me/50683466734?text=${encodeURIComponent(mensaje)}`);

}

// COUNTDOWN
function updateCountdown(){

const eventDate = new Date("Oct 3, 2026 17:00:00").getTime();
const now = new Date().getTime();
const diff = eventDate - now;

if(diff <= 0){
document.getElementById("countdown").innerHTML = "¡Hoy es el gran día!";
return;
}

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML = `
<div class="count-box">${days} Días</div>
<div class="count-box">${hours} Hrs</div>
<div class="count-box">${minutes} Min</div>
<div class="count-box">${seconds} Seg</div>
`;

}

setInterval(updateCountdown,1000);

</script>

</body>
</html>
